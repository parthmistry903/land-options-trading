{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<h1 class="mb-4">Add New User</h1>
<form method="POST">
    <div class="mb-3">
        <label for="user_id" class="form-label">User ID (e.g., U001)</label>
        <input type="text" class="form-control" id="user_id" name="user_id" required>
    </div>
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
    </div>
    <div class="mb-3">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="full_name" name="full_name" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="mb-3">
        <label for="balance_cash" class="form-label">Starting Balance (INR)</label>
        <input type="number" class="form-control" id="balance_cash" name="balance_cash" value="00000000" required>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Initial Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-success">Add User</button>
    <a href="{{ url_for('list_users') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
