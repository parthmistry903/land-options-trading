{% extends "base.html" %}
{% block title %}Map - LandOptions{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
    #map {
        height: 60vh;
        width: 100%;
        border-radius: .5rem;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
        z-index: 1;
    }
    @media (min-width: 992px) {
        #map { height: 75vh; }
    }
    .map-sidebar h5, .map-sidebar label {
        color: var(--bs-body-color);
        font-weight: 500;
    }
    .filter-btn.active {
        font-weight: bold;
        box-shadow: inset 0 3px 5px rgba(0,0,0,0.125);
    }
    .legend {
        background: var(--card-bg-light);
        color: var(--bs-body-color);
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        font-size: 0.9rem;
    }
    .marker-cluster-small { background-color: rgba(40, 167, 69, 0.8) !important; color: #fff !important; }
    .marker-cluster-medium { background-color: rgba(111, 66, 193, 0.9) !important; color: #fff !important; }
    .marker-cluster-large { background-color: rgba(13, 110, 253, 0.95) !important; color: #fff !important; }
</style>
{% endblock %}
{% block content %}
<div class="row g-4">
    <div class="col-12 col-lg-9 order-1 order-lg-2">
        <div id="map"></div>
    </div>
    <div class="col-12 col-lg-3 order-2 order-lg-1 map-sidebar">
        <div class="card shadow-sm p-3 h-100">
            <h5 class="mb-3 border-bottom pb-2">Discovery Filters 🗺️</h5>
            <label class="form-label small text-muted text-uppercase fw-bold">Target City</label>
            <select id="city-filter" class="form-select mb-4">
                <option value="">All Cities</option>
                {% for c in cities %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
            
            <label class="form-label small text-muted text-uppercase fw-bold mb-2">Market Layers</label>
            <div class="d-grid gap-2 mb-4">
                <button class="btn btn-outline-success filter-btn active" id="btn-sale" data-layer="sale">
                    <i class="bi bi-house-door-fill me-2"></i> Properties For Sale
                </button>
                <button class="btn btn-outline-purple filter-btn active" id="btn-options" data-layer="options" style="border-color: #6f42c1; color: #6f42c1;">
                    <i class="bi bi-lightning-fill me-2"></i> Active Options Market
                </button>
                <button class="btn btn-outline-primary filter-btn active" id="btn-portfolio" data-layer="portfolio">
                    <i class="bi bi-briefcase-fill me-2"></i> My Portfolio
                </button>
                <button class="btn btn-outline-secondary filter-btn active" id="btn-general" data-layer="general">
                    <i class="bi bi-globe-central-south-asia me-2"></i> General Land (Not for Sale)
                </button>
            </div>

            <div class="form-check form-switch mb-4 mt-2">
                <input class="form-check-input" type="checkbox" role="switch" id="toggle-heat" checked>
                <label class="form-check-label fw-bold" for="toggle-heat">Price Momentum Heatmap</label>
            </div>

            <div class="legend mt-auto" id="map-legend">
                <strong class="d-block mb-2">Map Legend 📊</strong>
                <div class="d-flex align-items-center mb-2">
                    <span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: #28a745; margin-right: 8px;"></span> For Sale
                </div>
                <div class="d-flex align-items-center mb-2">
                    <span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: #6f42c1; margin-right: 8px;"></span> Open Option
                </div>
                <div class="d-flex align-items-center mb-2">
                    <span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: #0d6efd; margin-right: 8px;"></span> Owned by You
                </div>
                <div class="d-flex align-items-center mb-3">
                    <span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: #6c757d; margin-right: 8px;"></span> Not For Sale
                </div>
                <div class="d-flex align-items-center mb-1 small text-muted">
                    <span style="display: inline-block; width: 15px; height: 5px; background-color: #dc3545; margin-right: 8px;"></span> High Momentum Area
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block script_extra %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script>
    const CURRENT_USER_ID = "{{ current_user_id }}";

    document.addEventListener('DOMContentLoaded', function () {
        const map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const layerGroupSale = L.markerClusterGroup();
        const layerGroupPortfolio = L.markerClusterGroup();
        const layerGroupGeneral = L.markerClusterGroup();
        const layerGroupOptions = L.layerGroup();
        let heatLayer = null;

        const iconBase = 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers/master/img/marker-icon-2x-';
        const iconConf = { iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] };
        
        const iconGreen = L.icon({ iconUrl: iconBase + 'green.png', ...iconConf });
        const iconBlue = L.icon({ iconUrl: iconBase + 'blue.png', ...iconConf });
        const iconViolet = L.icon({ iconUrl: iconBase + 'violet.png', ...iconConf });
        const iconGrey = L.icon({ iconUrl: iconBase + 'grey.png', ...iconConf });

        async function loadParcels(city) {
            const params = city ? '?city=' + encodeURIComponent(city) : '';
            const resp = await fetch('/api/parcels_geojson' + params);
            const geojson = await resp.json();
            
            layerGroupSale.clearLayers();
            layerGroupPortfolio.clearLayers();
            layerGroupGeneral.clearLayers();

            if (geojson.features) {
                geojson.features.forEach(feature => {
                    const p = feature.properties;
                    const latlng = [feature.geometry.coordinates[1], feature.geometry.coordinates[0]];
                    
                    const isOwner = p.owner_user_id === CURRENT_USER_ID;
                    const isForSale = String(p.is_for_sale) === '1' || String(p.is_for_sale).toLowerCase() === 'true';
                    
                    let markerIcon = iconGrey;
                    if (isOwner) markerIcon = iconBlue;
                    else if (isForSale) markerIcon = iconGreen;

                    const marker = L.marker(latlng, { icon: markerIcon });
                    
                    let popupHtml = `<div class="text-center"><strong>${p.address || `Parcel ${p.parcel_id}`}</strong><br/><small class="text-muted">${p.city}</small></div><hr class="my-2"/>`;
                    
                    if (isOwner) {
                        popupHtml += `<div class="mb-2 text-primary fw-bold">Your Property</div>`;
                        popupHtml += `<a href="/parcels/${p.parcel_id}" class="btn btn-sm btn-outline-primary w-100">Manage Asset</a>`;
                        marker.bindPopup(popupHtml);
                        layerGroupPortfolio.addLayer(marker);
                    } else if (isForSale) {
                        const priceDisp = p.listing_price_inr ? p.listing_price_inr : p.base_price_inr;
                        popupHtml += `<div class="mb-2">Asking: <strong class="text-success fs-6">₹${Number(priceDisp).toLocaleString()}</strong></div>`;
                        popupHtml += `<form method="POST" action="/buy_parcel/${p.parcel_id}"><button type="submit" class="btn btn-sm btn-success w-100 fw-bold">Buy Property</button></form>`;
                        popupHtml += `<a href="/parcels/${p.parcel_id}" class="d-block text-center mt-2 small text-decoration-none">View Details</a>`;
                        marker.bindPopup(popupHtml);
                        layerGroupSale.addLayer(marker);
                    } else {
                        popupHtml += `<div class="mb-2 text-muted fw-bold">Not Listed for Sale</div>`;
                        popupHtml += `<div class="mb-2 small">Est. Value: ₹${Number(p.base_price_inr).toLocaleString()}</div>`;
                        popupHtml += `<a href="/parcels/${p.parcel_id}" class="btn btn-sm btn-outline-secondary w-100">View Data</a>`;
                        marker.bindPopup(popupHtml);
                        layerGroupGeneral.addLayer(marker);
                    }
                });
            }

            if (document.getElementById('btn-sale').classList.contains('active')) map.addLayer(layerGroupSale);
            if (document.getElementById('btn-portfolio').classList.contains('active')) map.addLayer(layerGroupPortfolio);
            if (document.getElementById('btn-general').classList.contains('active')) map.addLayer(layerGroupGeneral);
            
            if (!city && layerGroupGeneral.getLayers().length > 0) {
                try { map.fitBounds(layerGroupGeneral.getBounds().pad(0.1)); } catch (e) { }
            }
        }

        async function loadOptions() {
            const resp = await fetch('/api/options_geojson');
            const geojson = await resp.json();
            
            layerGroupOptions.clearLayers();

            if (geojson.features) {
                geojson.features.forEach(feature => {
                    const p = feature.properties;
                    if (p.status !== 'Open' || p.seller_user_id === CURRENT_USER_ID) return;

                    const latlng = [feature.geometry.coordinates[1], feature.geometry.coordinates[0]];
                    const marker = L.marker(latlng, { icon: iconViolet });
                    let popupHtml = `<div class="text-center"><strong style="color: #6f42c1;">Option ${p.option_id}</strong><br/><small class="text-muted">Exp: ${p.expiry_date}</small></div><hr class="my-2"/>`;
                    popupHtml += `<div class="d-flex justify-content-between mb-1"><span>Strike:</span> <strong>₹${Number(p.strike_inr).toLocaleString()}</strong></div>`;
                    popupHtml += `<div class="d-flex justify-content-between mb-3"><span>Premium:</span> <strong class="text-danger">₹${Number(p.premium_inr).toLocaleString()}</strong></div>`;
                    popupHtml += `<form method="POST" action="/buy_option/${p.option_id}"><button type="submit" class="btn btn-sm w-100 fw-bold text-white" style="background-color: #6f42c1;">Trade Contract</button></form>`;
                    
                    marker.bindPopup(popupHtml);
                    layerGroupOptions.addLayer(marker);
                });
            }

            if (document.getElementById('btn-options').classList.contains('active')) map.addLayer(layerGroupOptions);
        }

        async function loadHeat() {
            const resp = await fetch('/api/heat_by_city');
            const data = await resp.json();
            if (heatLayer) map.removeLayer(heatLayer);
            if (!data || data.length === 0) return;
            const heatPoints = data.map(d => [d.lat, d.lon, Math.max(0.1, Math.log(Number(d.avg_price || 1)) / 10)]);
            heatLayer = L.heatLayer(heatPoints, {
                radius: 30, blur: 20, maxZoom: 12,
                gradient: { 0.2: '#008744', 0.4: '#38b000', 0.6: '#ffc107', 0.8: '#ff6600', 1.0: '#dc3545' }
            });
            if (document.getElementById('toggle-heat').checked) heatLayer.addTo(map);
        }

        loadParcels(); loadOptions(); loadHeat();

        document.getElementById('city-filter').addEventListener('change', function (e) { loadParcels(e.target.value); });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('active');
                const layer = this.getAttribute('data-layer');
                if (layer === 'sale') {
                    this.classList.contains('active') ? map.addLayer(layerGroupSale) : map.removeLayer(layerGroupSale);
                } else if (layer === 'options') {
                    this.classList.contains('active') ? map.addLayer(layerGroupOptions) : map.removeLayer(layerGroupOptions);
                    if(this.classList.contains('active')) {
                        this.style.backgroundColor = '#6f42c1';
                        this.style.color = '#fff';
                    } else {
                        this.style.backgroundColor = 'transparent';
                        this.style.color = '#6f42c1';
                    }
                } else if (layer === 'portfolio') {
                    this.classList.contains('active') ? map.addLayer(layerGroupPortfolio) : map.removeLayer(layerGroupPortfolio);
                } else if (layer === 'general') {
                    this.classList.contains('active') ? map.addLayer(layerGroupGeneral) : map.removeLayer(layerGroupGeneral);
                }
            });
        });

        document.getElementById('btn-options').style.backgroundColor = '#6f42c1';
        document.getElementById('btn-options').style.color = '#fff';

        document.getElementById('toggle-heat').addEventListener('change', function (e) { 
            if (e.target.checked && heatLayer) map.addLayer(heatLayer); 
            else if (heatLayer) map.removeLayer(heatLayer); 
        });
    });
</script>
{% endblock %}
