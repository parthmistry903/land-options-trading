{% extends "base.html" %}
{% block title %}Map - LandOptions{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
    #map {
        height: 60vh;
        width: 100%;
        border-radius: .5rem;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
        z-index: 1;
    }
    @media (min-width: 768px) {
        #map { height: 75vh; }
    }
    .map-sidebar h5, .map-sidebar label, .map-sidebar .form-check-label {
        color: var(--bs-body-color);
        font-weight: 500;
    }
    .legend {
        background: var(--card-bg-light);
        color: var(--bs-body-color);
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        font-size: 0.9rem;
    }
    .marker-cluster-small { background-color: rgba(30, 255, 170, 0.8) !important; color: #000 !important; }
    .marker-cluster-medium { background-color: rgba(255, 187, 0, 0.9) !important; color: #000 !important; }
    .marker-cluster-large { background-color: rgba(220, 0, 50, 0.95) !important; color: #fff !important; }
</style>
{% endblock %}
{% block content %}
<div class="row g-4">
    <div class="col-12 col-md-4 col-lg-3 map-sidebar">
        <div class="card shadow-sm p-3 h-100">
            <h5 class="mb-3 border-bottom pb-2">Map Filters 🗺️</h5>
            <label class="form-label small text-muted text-uppercase fw-bold">City Selection</label>
            <select id="city-filter" class="form-select mb-4">
                <option value="">All Cities</option>
                {% for c in cities %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" role="switch" value="" id="toggle-parcels" checked>
                <label class="form-check-label" for="toggle-parcels">Land Parcels (Assets)</label>
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" role="switch" value="" id="toggle-options" checked>
                <label class="form-check-label" for="toggle-options">Options Contracts</label>
            </div>
            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" role="switch" value="" id="toggle-heat" checked>
                <label class="form-check-label" for="toggle-heat">Price Heatmap</label>
            </div>
            <div class="legend mt-auto" id="map-legend">
                <strong class="d-block mb-2">Legend 📊</strong>
                <div class="d-flex align-items-center mb-1"><span class="badge bg-primary me-2" style="width: 15px; height: 15px; border-radius: 50%;"></span> Parcel Location</div>
                <div class="d-flex align-items-center mb-1"><span class="badge bg-danger me-2" style="width: 15px; height: 15px; border-radius: 50%;"></span> Options Contract</div>
                <div class="d-flex align-items-center mb-1"><span class="badge bg-success me-2" style="width: 15px; height: 15px; border-radius: 0;"></span> Heatmap Low</div>
                <div class="d-flex align-items-center"><span class="badge bg-danger me-2" style="width: 15px; height: 15px; border-radius: 0;"></span> Heatmap High</div>
            </div>
        </div>
    </div>
    <div class="col-12 col-md-8 col-lg-9">
        <div id="map"></div>
    </div>
</div>
{% endblock %}
{% block script_extra %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        const parcelLayerGroup = L.markerClusterGroup();
        const optionLayerGroup = L.layerGroup();
        let heatLayer = null;
        async function loadParcels(city) {
            const params = city ? '?city=' + encodeURIComponent(city) : '';
            const resp = await fetch('/api/parcels_geojson' + params);
            const geojson = await resp.json();
            parcelLayerGroup.clearLayers();
            L.geoJSON(geojson, {
                pointToLayer: function (feature, latlng) {
                    const marker = L.marker(latlng, {
                        icon: L.icon({
                            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                        })
                    });
                    const p = feature.properties;
                    const popupHtml = `<strong>Parcel ${p.parcel_id}</strong><br/>${p.address ? p.address + '<br/>' : ''}City: ${p.city || 'N/A'}<br/>Owner: ${p.owner_name || p.owner_user_id || 'N/A'}<br/>Base Price: ${p.base_price_inr ? '₹' + Number(p.base_price_inr).toLocaleString() : 'N/A'}<br/><a href="/parcels/${p.parcel_id}" class="btn btn-sm btn-primary mt-2 w-100">View Parcel</a>`;
                    marker.bindPopup(popupHtml);
                    return marker;
                }
            }).addTo(parcelLayerGroup);
            if (!map.hasLayer(parcelLayerGroup)) parcelLayerGroup.addTo(map);
            if (parcelLayerGroup.getLayers().length > 0 && !city) {
                try { map.fitBounds(parcelLayerGroup.getBounds(), { padding: [30, 30] }); } catch (e) { }
            }
        }
        async function loadOptions() {
            const resp = await fetch('/api/options_geojson');
            const geojson = await resp.json();
            optionLayerGroup.clearLayers();
            L.geoJSON(geojson, {
                pointToLayer: function (feature, latlng) {
                    const p = feature.properties;
                    const marker = L.circleMarker(latlng, { radius: 7, color: '#FD5C63', fillColor: '#FD5C63', fillOpacity: 0.9 });
                    const popupHtml = `<strong>Option ${p.option_id}</strong><br/>Parcel: <a href="/parcels/${p.parcel_id}">${p.parcel_id}</a><br/>Strike: ${p.strike_inr ? '₹' + Number(p.strike_inr).toLocaleString() : 'N/A'}<br/>Premium: ${p.premium_inr ? '₹' + Number(p.premium_inr).toLocaleString() : 'N/A'}<br/>Status: <span class="badge bg-secondary">${p.status}</span>`;
                    marker.bindPopup(popupHtml);
                    return marker;
                }
            }).addTo(optionLayerGroup);
            if (!map.hasLayer(optionLayerGroup)) optionLayerGroup.addTo(map);
        }
        async function loadHeat() {
            const resp = await fetch('/api/heat_by_city');
            const data = await resp.json();
            if (heatLayer) map.removeLayer(heatLayer);
            const heatPoints = data.map(d => [d.lat, d.lon, Math.max(0.1, Math.log(Number(d.avg_price || 1)) / 10)]);
            heatLayer = L.heatLayer(heatPoints, {
                radius: 25, blur: 18, maxZoom: 12,
                gradient: { 0.2: '#008744', 0.4: '#38b000', 0.6: '#ffc107', 0.8: '#ff6600', 1.0: '#dc3545' }
            });
            heatLayer.addTo(map);
        }
        loadParcels(); loadOptions(); loadHeat();
        document.getElementById('city-filter').addEventListener('change', function (e) { loadParcels(e.target.value); });
        document.getElementById('toggle-parcels').addEventListener('change', function (e) { if (e.target.checked) { map.addLayer(parcelLayerGroup); } else { map.removeLayer(parcelLayerGroup); } });
        document.getElementById('toggle-options').addEventListener('change', function (e) { if (e.target.checked) { map.addLayer(optionLayerGroup); } else { map.removeLayer(optionLayerGroup); } });
        document.getElementById('toggle-heat').addEventListener('change', function (e) { if (e.target.checked) { if (heatLayer) map.addLayer(heatLayer); } else { if (heatLayer) map.removeLayer(heatLayer); } });
    });
</script>
{% endblock %}
