{% extends "base.html" %}
{% block title %}Login - LandOptions{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow border-0 overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-4 border-0">
                <h3 class="mb-0 fw-bold">Welcome Back</h3>
                <p class="mb-0 text-white-50 small mt-1">Login to access your portfolio</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" name="password" id="passwordInput" class="form-control border-start-0 border-end-0 ps-0" placeholder="••••••••" required>
                            <button class="btn btn-light border border-start-0" type="button" id="togglePassword">
                                <i class="bi bi-eye text-muted" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm">Login to Dashboard</button>
                </form>
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted mb-0">
                        Don't have an account?
                        <a href="{{ url_for('register') }}" class="fw-bold text-decoration-none">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('passwordInput');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        }
    });
</script>
{% endblock %}
