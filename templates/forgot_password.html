{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-secondary bg-dark text-light">
                <div class="card-header bg-secondary text-white text-center">
                    <h4 class="mb-0">Reset Password</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('forgot_password') }}">
                        <div class="mb-3">
                            <label class="form-label text-light">Username</label>
                            <input type="text" class="form-control" name="username" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">Email Address</label>
                            <input type="email" class="form-control" name="email" placeholder="Enter your registered email" required>
                        </div>
                        <hr class="border-secondary my-4">
                        <div class="mb-3">
                            <label class="form-label text-light">New Password</label>
                            <input type="password" class="form-control" name="new_password" placeholder="Create new password" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-light">Confirm New Password</label>
                            <input type="password" class="form-control" name="confirm_password" placeholder="Confirm new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Reset My Password</button>
                    </form>
                </div>
                <div class="card-footer text-center border-secondary">
                    <a href="{{ url_for('login') }}" class="text-info text-decoration-none">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
