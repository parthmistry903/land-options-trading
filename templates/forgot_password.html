{% extends "base.html" %} {% block title %}Reset Password{% endblock %} {% block
content %}
<div class="auth-shell">
  <div class="row justify-content-center w-100">
    <div class="col-12 col-md-10 col-lg-6">
      <div class="card auth-card">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
              <div class="section-kicker mb-2">Account recovery</div>
              <h2 class="fw-bold mb-0">Reset Password</h2>
            </div>
            <span class="badge text-bg-warning">Secure</span>
          </div>
          <form
            method="POST"
            action="{{ url_for('forgot_password') }}"
            class="vstack gap-3"
          >
            <div>
              <label class="form-label fw-semibold">Username</label
              ><input
                type="text"
                class="form-control"
                name="username"
                placeholder="Enter your username"
                required
              />
            </div>
            <div>
              <label class="form-label fw-semibold">Email Address</label
              ><input
                type="email"
                class="form-control"
                name="email"
                placeholder="Enter your registered email"
                required
              />
            </div>
            <div class="glow-line my-2"></div>
            <div>
              <label class="form-label fw-semibold">New Password</label
              ><input
                type="password"
                class="form-control"
                name="new_password"
                placeholder="Create new password"
                required
              />
            </div>
            <div>
              <label class="form-label fw-semibold">Confirm New Password</label
              ><input
                type="password"
                class="form-control"
                name="confirm_password"
                placeholder="Confirm new password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary py-3 fw-bold">
              Reset My Password
            </button>
          </form>
          <div class="text-center mt-4 pt-4 border-top">
            <a
              href="{{ url_for('login') }}"
              class="text-decoration-none fw-semibold"
              >Back to Login</a
            >
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
