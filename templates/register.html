{% extends "base.html" %}
{% block title %}Register - LandOptions{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow border-0 overflow-hidden">
            <div class="card-header bg-success text-white text-center py-4 border-0">
                <h3 class="mb-0 fw-bold">Create Account</h3>
                <p class="mb-0 text-white-50 small mt-1">Join the LandOptions Trading Network</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="row g-3 mb-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label text-muted small text-uppercase fw-bold">Full Name</label>
                            <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label text-muted small text-uppercase fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">@</span>
                                <input type="text" name="username" class="form-control" placeholder="johndoe123" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Create a strong password" required>
                            <button class="btn btn-light border" type="button" onclick="toggleVisibility('passwordInput', 'eyeIcon1')">
                                <i class="bi bi-eye text-muted" id="eyeIcon1"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="form-label text-muted small text-uppercase fw-bold">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-check-circle text-muted"></i></span>
                            <input type="password" name="confirm_password" id="confirmPasswordInput" class="form-control" placeholder="Repeat password" required>
                            <button class="btn btn-light border" type="button" onclick="toggleVisibility('confirmPasswordInput', 'eyeIcon2')">
                                <i class="bi bi-eye text-muted" id="eyeIcon2"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-3 fw-bold fs-5 shadow-sm">Create Account</button>
                </form>
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function toggleVisibility(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
</script>
{% endblock %}
